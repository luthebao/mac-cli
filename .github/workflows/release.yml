name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: build (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-14
            arch:   arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Odin
        run: brew install odin

      - name: Resolve version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          echo "Building $VERSION"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: make release VERSION="$VERSION"

      - name: Capture artifact info
        id: artifact
        env:
          VERSION: ${{ steps.version.outputs.value }}
          ARCH: ${{ matrix.arch }}
        run: |
          TARBALL="mac-cli-v${VERSION}-darwin-${ARCH}.tar.gz"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.tarball }}
          path: build/${{ steps.artifact.outputs.tarball }}

  release:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir -p release
          find artifacts -name 'mac-cli-v*.tar.gz' -exec cp {} release/ \;
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/mac-cli-v*.tar.gz
          generate_release_notes: true
